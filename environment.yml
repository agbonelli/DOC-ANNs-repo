name: doc-anns
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.21,<2.0
  - pandas>=1.5
  - scipy>=1.9
  - matplotlib>=3.6
  - scikit-learn>=1.2
  - joblib>=1.2
  - netCDF4>=1.6
  - jupyter>=1.0
  - ipykernel>=6.0
  - ipywidgets>=7.0
  - pytest>=7.0
  - pip
  # TensorFlow is installed separately after env creation.
  # See INSTALL.md for platform-specific instructions:
  #   Mac Intel / Linux / Windows  → pip install tensorflow-cpu
  #   Mac Apple Silicon (M1/M2/M3) → pip install tensorflow-macos
